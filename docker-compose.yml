services:
  mysql:
    image: mysql:8.0
    container_name: smartcare-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-zhiyangyun}
      MYSQL_USER: ${DB_USER:-app}
      MYSQL_PASSWORD: ${DB_PASSWORD:-app123456}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init/1_schema.sql:/docker-entrypoint-initdb.d/1_schema.sql:ro
      - ./docker/mysql/init/2_data.sql:/docker-entrypoint-initdb.d/2_data.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
  redis:
    image: redis:7.2
    container_name: smartcare-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartcare-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DB_USER: ${DB_USER:-app}
      DB_PASSWORD: ${DB_PASSWORD:-app123456}
      JWT_SECRET: ${JWT_SECRET:-change-me-please-change-me-please-change-me}
      DEMO_SEED_ENABLED: ${DEMO_SEED_ENABLED:-false}
    volumes:
      - ./output/uploads:/app/uploads
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - redis

  frontend:
    build:
      context: ./admin-web
      dockerfile: Dockerfile
    container_name: smartcare-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
volumes:
  mysql_data:
  redis_data:
